<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>

        <a href="index.html" class="logo">
            Store
        </a>

        <input
            type="text"
            id="search"
            placeholder="Search products..."
        >

        <nav>

            <a href="index.html">
                Home
            </a>

            <a href="contact.html">
                Contact
            </a>

            <a href="cart.html">
                🛒 Cart
                <span id="cart-count">
                    0
                </span>
            </a>

        </nav>

    </header>

    <!-- Hero -->

    <section class="hero">

        <h1>
            Welcome to Store
        </h1>

        <p>
            DEMO
        </p>

    </section>

    <!-- Categories -->

    <section class="categories">

        <button class="category active" data-category="All">
            All
        </button>

        <button class="category" data-category="Accessories">
            Accessories
        </button>

        <button class="category" data-category="Electronics">
            Electronics
        </button>

        <button class="category" data-category="Gaming">
            Gaming
        </button>

    </section>

    <!-- Products -->

    <main>

        <div id="products">

            <!-- Products appear here -->

        </div>

    </main>

    <!-- Footer -->

    <footer>

        © 2026 Store

    </footer>

    <script src="script.js"></script>

</body>
</html>
